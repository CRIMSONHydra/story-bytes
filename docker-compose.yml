services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234321}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sh:/docker-entrypoint-initdb.d/02-seed.sh
      - ./db/seed.dump:/docker-entrypoint-initdb.d/seed.dump
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "80:80"
    volumes:
      - ./dataset:/app/dataset
      - ./processed:/app/processed

volumes:
  pgdata:
